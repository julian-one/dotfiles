# ---------------------------------------------------------------------------
# Prefix
# ---------------------------------------------------------------------------
# Remap prefix from Ctrl-b to Ctrl-Space (easier to reach, no conflict with
# readline backward-char). Press Ctrl-Space before any tmux command key.
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
# Enable 256-color and true-color (RGB) support so terminal apps like nvim
# render themes correctly.
set -g default-terminal "tmux-256color"
set -sa terminal-features ",xterm-256color:RGB"

# Start window and pane numbering at 1 (0 is far from the other keys).
set -g base-index 1
setw -g pane-base-index 1

# When a window is closed, renumber the remaining windows sequentially so
# there are no gaps (e.g. 1 2 3 instead of 1 3 4).
set -g renumber-windows on

# Use vi-style keys in copy mode (prefix + [ to enter, v to select, y to
# yank). Matches the vi keybindings in your zshrc.
set -g mode-keys vi

# Enable mouse support — click to select panes/windows, drag to resize
# panes, scroll to enter copy mode.
set -g mouse off

# Increase the scrollback buffer from the default 2000 to 10000 lines.
set -g history-limit 10000

# Reduce the delay after pressing Escape so vi-mode in nested apps (nvim)
# feels instant. Default is 500ms.
set -g escape-time 10

# How often (in seconds) the status bar refreshes. Lower values update
# clock/battery/etc. more frequently.
set -g status-interval 5

# Keep a window alive even if its shell exits (useful for debugging).
# "off" means panes close normally when the process exits.
set -g remain-on-exit off

# ---------------------------------------------------------------------------
# Status bar
# ---------------------------------------------------------------------------
# Position the status bar at the top of the screen.
set -g status-position top

# Center the window list in the status bar.
set -g status-justify absolute-centre

# Transparent background — inherits from your terminal's background color.
set -g status-style "bg=default"

# Highlight the active window with inverted colors (black text, white bg).
set -g window-status-current-style "fg=black,bg=white"

# Left side: show the session name. Right side: empty (minimal look).
set -g status-left " #S "
set -g status-right ""

# ---------------------------------------------------------------------------
# Key bindings
# ---------------------------------------------------------------------------
# Reload this config file with prefix + r and display a confirmation.
bind r source-file "~/.config/tmux/tmux.conf" \; display "Config reloaded"

# Toggle the status bar on/off with prefix + b.
bind b set -g status

# Split panes with | and - (more intuitive than % and ").
# New panes open in the same directory as the current pane.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate between panes with vim-style h/j/k/l.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes in increments of 5 with Shift + vim keys.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Create new windows in the current pane's working directory.
bind c new-window -c "#{pane_current_path}"

# ---------------------------------------------------------------------------
# Copy mode (vi)
# ---------------------------------------------------------------------------
# Enter copy mode with prefix + [. Then:
#   v     — begin selection
#   y     — yank (copy) selection
#   Enter — also yanks selection
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
