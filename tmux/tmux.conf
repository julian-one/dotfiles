# Prefix
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# Color
set -g default-terminal "tmux-256color"
set -sa terminal-features ",xterm-256color:RGB"

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g mode-keys vi

set -g mouse off

set -g history-limit 10000

set -g escape-time 10
set -g focus-events on

set -g status-interval 5

set -g remain-on-exit off

# Status bar
set -g status 2
set -g status-position top
set -g status-justify absolute-centre

set -g status-style "bg=default,fg=colour244"
set -g status-left " #[bold]#S#[nobold] "
set -g status-right ""

set -g window-status-format " #I:#W "
set -g window-status-style "fg=colour244,bg=default"
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "fg=white,bold,bg=default"
set -g window-status-separator ""

# Empty line separator between status bar and terminal content
set -g status-format[1] "#[bg=default]"

# Key bindings
bind r source-file "~/.config/tmux/tmux.conf" \; display "Config reloaded"
bind b set -g status

# Split panes with | and - (more intuitive than % and ").
# New panes open in the same directory as the current pane.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate between panes with vim-style h/j/k/l.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Seamless navigation between vim splits and tmux panes via <C-h/j/k/l>.
# Requires christoomey/vim-tmux-navigator in nvim. When the focused pane is
# running vim/nvim, the key is forwarded; otherwise tmux selects the pane.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Resize panes in increments of 5 with Shift + vim keys.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Create new windows in the current pane's working directory.
bind c new-window -c "#{pane_current_path}"

# Copy mode (vi)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
